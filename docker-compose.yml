services:
  cosense-mcp:
    build: .
    ports:
      - "4100:4100"
    environment:
      - TRANSPORT=http
      - PORT=4100
      - COSENSE_PROJECT_NAME=${COSENSE_PROJECT_NAME}
      - COSENSE_SID=${COSENSE_SID}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - COSENSE_NOTATION_CONFIG=/app/notation.config.json
    volumes:
      - ./notation.config.json:/app/notation.config.json:ro
    restart: unless-stopped
